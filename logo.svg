<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="120" height="120">
  <!-- Interlocking hexagon brackets -->
  <!-- Purple left bracket: Top → TopLeft → BottomLeft (behind cyan at top) -->
  <polyline points="30,6 9.2,18 9.2,42"
    fill="none" stroke="#6C5CE7" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Cyan right bracket: Top → TopRight → BottomRight → Bottom (over purple at top) -->
  <polyline points="30,6 50.8,18 50.8,42 30,54"
    fill="none" stroke="#00D4FF" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Purple lower segment: BottomLeft → Bottom (over cyan at bottom) -->
  <polyline points="9.2,42 30,54"
    fill="none" stroke="#6C5CE7" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
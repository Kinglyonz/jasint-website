<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <defs>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- Left/back hexagon face -->
  <polygon points="18,12 30,5 30,30 18,37" fill="url(#purple)"/>
  <polygon points="18,37 30,30 30,55 18,48" fill="url(#purple)" opacity="0.8"/>
  <!-- Right/front hexagon face -->
  <polygon points="30,5 42,12 42,37 30,30" fill="url(#cyan)"/>
  <polygon points="30,30 42,37 42,48 30,55" fill="url(#cyan)" opacity="0.85"/>
  <!-- Top facet -->
  <polygon points="18,12 30,5 42,12 30,19" fill="url(#cyan)" opacity="0.6"/>
  <!-- Mid connector -->
  <polygon points="18,37 30,30 42,37 30,44" fill="url(#purple)" opacity="0.5"/>
</svg>